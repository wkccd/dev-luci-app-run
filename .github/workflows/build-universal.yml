name: Build OpenWrt 21-24 Packages

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 unzip file wget rsync zstd

      - name: Download OpenWrt SDK
        run: |
          URL="https://downloads.openwrt.org/releases/21.02.7/targets/armvirt/64/openwrt-sdk-21.02.7-armvirt-64_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
          echo "URL: $URL"
          
          wget -q --show-progress "$URL" -O sdk.tar.xz
          rm -rf sdk
          
          echo "Extracting SDK..."
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk 2>/dev/null || true
          
          echo "SDK extracted to ./sdk/"
          ls -la sdk/ | head -n 10

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-run
          ./scripts/feeds install luci-i18n-run-zh-cn

      - name: Copy package
        run: |
          cp -r luci-app-run sdk/package/

      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/luci-app-run/compile V=s -j$(nproc)

      - name: Prepare release files
        run: |
          mkdir -p release
          find sdk/bin -type f -name "luci-app-run*.ipk" -exec cp -v {} release/ \;
          ls -lh release/

      - name: Create Release
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: luci-app-run ${{ steps.tag.outputs.tag }}
          files: release/luci-app-run*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
