name: Build 25 x86-64

on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - "25.12.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 unzip file wget rsync zstd
      # =========================
      # Download SDK (correct URLs)
      # =========================
      - name: Download OpenWrt SDK
        run: |
          if [ "${{ matrix.sdk }}" = "24.10.6" ]; then
            URL="https://archive.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          else
            URL="https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          fi
          echo "Downloading: $URL"
          wget -q "$URL" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk
      # =========================
      # feeds
      # =========================
      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-run
          ./scripts/feeds install luci-i18n-run-zh-cn
      # =========================
      # copy package
      # =========================
      - name: Copy luci-app-run
        run: |
          cp -r luci-app-run sdk/package/
      # =========================
      # build
      # =========================
      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/luci-app-run/compile V=s -j$(nproc)
      # =========================
      # collect output
      # =========================
      - name: Collect ipk/apk
        run: |
          mkdir -p dist
          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -v {} dist/ \;
      # =========================
      # upload
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-run-${{ matrix.sdk }}-x86_64
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten
        run: |
          mkdir -p release
          find dist-all -type f -exec cp -v {} release/ \;
      - name: Create tag
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: luci-app-run ${{ steps.tag.outputs.tag }}
          files: release/luci-app-run*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
